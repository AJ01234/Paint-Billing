services:
  - type: web
    name: anklikar-billing
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: anklikar-billing-db
          property: connectionString
  - type: pserv
    name: anklikar-billing-db
    env: postgres
    plan: free
